name: Notificaciones 18 Semanas
 
on:
  schedule:
    # ===================== MINIJUEGO — PISTAS =====================
    # Pista 1: Dom 22 Feb 00:00 UTC (01:00 España)
    - cron: '0 0 22 2 *'
    # Pista 2: Lun 23 Feb 00:00 UTC
    - cron: '0 0 23 2 *'
    # Pista 3: Mar 24 Feb 00:00 UTC
    - cron: '0 0 24 2 *'
    # Pista 4: Mar 24 Feb 12:00 UTC
    - cron: '0 12 24 2 *'
    # Pista 5: Mié 25 Feb 00:00 UTC
    - cron: '0 0 25 2 *'
    # Pista 6: Mié 25 Feb 12:00 UTC
    - cron: '0 12 25 2 *'
    # Pista 7: Jue 26 Feb 00:00 UTC
    - cron: '0 0 26 2 *'
    # Pista 8: Vie 27 Feb 00:00 UTC
    - cron: '0 0 27 2 *'
 
    # ===================== PRESENTACIÓN =====================
    # Vie 27 Feb 10:30 UTC = 11:30 España (UTC+1)
    - cron: '30 10 27 2 *'
 
    # ===================== PISTAS DE REGALOS =====================
    # Semana 1: Dom 1 Mar 23:00 UTC = 00:00 España
    - cron: '0 23 1 3 *'
    # Semana 2: Dom 8 Mar 23:00 UTC
    - cron: '0 23 8 3 *'
    # Semana 3: Dom 15 Mar 23:00 UTC
    - cron: '0 23 15 3 *'
    # Semana 4: Dom 22 Mar 23:00 UTC
    - cron: '0 23 22 3 *'
    # Semana 5: Dom 29 Mar 22:00 UTC = 00:00 España (UTC+2 horario verano)
    - cron: '0 22 29 3 *'
    # Semana 6: Dom 5 Abr 22:00 UTC
    - cron: '0 22 5 4 *'
    # Semana 7: Dom 12 Abr 22:00 UTC
    - cron: '0 22 12 4 *'
    # Semana 8: Dom 19 Abr 22:00 UTC
    - cron: '0 22 19 4 *'
    # Semana 9: Dom 26 Abr 22:00 UTC
    - cron: '0 22 26 4 *'
    # Semana 10: Dom 3 May 22:00 UTC
    # PAUSADO - cron: '0 22 3 5 *'
    # Semana 11: Dom 10 May 22:00 UTC
    # PAUSADO - cron: '0 22 10 5 *'
    # Semana 12: Dom 17 May 22:00 UTC
    # PAUSADO - cron: '0 22 17 5 *'
    # Semana 13: Dom 24 May 22:00 UTC
    # PAUSADO - cron: '0 22 24 5 *'
    # Semana 14: Dom 31 May 22:00 UTC
    # PAUSADO - cron: '0 22 31 5 *'
    # Semana 15: Dom 7 Jun 22:00 UTC
    # PAUSADO - cron: '0 22 7 6 *'
    # Semana 16: Dom 14 Jun 22:00 UTC
    # PAUSADO - cron: '0 22 14 6 *'
    # Semana 17: Dom 21 Jun 22:00 UTC
    # PAUSADO - cron: '0 22 21 6 *'
    # Semana 18: Dom 28 Jun 22:00 UTC
    # PAUSADO - cron: '0 22 28 6 *'
 
    # ===================== REGALOS DISPONIBLES =====================
    # Semana 1: Dom 1 Mar 23:30 UTC (30 min después de la pista)
    # PAUSADO - cron: '30 23 1 3 *'
    # Semana 2: Dom 8 Mar 23:30 UTC
    # PAUSADO - cron: '30 23 8 3 *'
    # Semana 3: Dom 15 Mar 23:30 UTC
    # PAUSADO - cron: '30 23 15 3 *'
    # Semana 4: Dom 22 Mar 23:30 UTC
    # PAUSADO - cron: '30 23 22 3 *'
    # Semana 5: Dom 29 Mar 22:30 UTC
    # PAUSADO - cron: '30 22 29 3 *'
    # Semana 6: Dom 5 Abr 22:30 UTC
    # PAUSADO - cron: '30 22 5 4 *'
    # Semana 7: Dom 12 Abr 22:30 UTC
    # PAUSADO - cron: '30 22 12 4 *'
    # Semana 8: Dom 19 Abr 22:30 UTC
    # PAUSADO - cron: '30 22 19 4 *'
    # Semana 9: Dom 26 Abr 22:30 UTC
    # PAUSADO - cron: '30 22 26 4 *'
    # Semana 10: Dom 3 May 22:30 UTC
    # PAUSADO - cron: '30 22 3 5 *'
    # Semana 11: Dom 10 May 22:30 UTC
    # PAUSADO - cron: '30 22 10 5 *'
    # Semana 12: Dom 17 May 22:30 UTC
    # PAUSADO - cron: '30 22 17 5 *'
    # Semana 13: Dom 24 May 22:30 UTC
    # PAUSADO - cron: '30 22 24 5 *'
    # Semana 14: Dom 31 May 22:30 UTC
    # PAUSADO - cron: '30 22 31 5 *'
    # Semana 15: Dom 7 Jun 22:30 UTC
    # PAUSADO - cron: '30 22 7 6 *'
    # Semana 16: Dom 14 Jun 22:30 UTC
    # PAUSADO - cron: '30 22 14 6 *'
    # Semana 17: Dom 21 Jun 22:30 UTC
    # PAUSADO - cron: '30 22 21 6 *'
    # Semana 18: Dom 28 Jun 22:30 UTC
    # PAUSADO - cron: '30 22 28 6 *'
 
  workflow_dispatch:
    inputs:
      tipo:
        description: 'Tipo de notificación manual'
        required: true
        default: 'pista_juego'
        type: choice
        options:
          - pista_juego
          - pista_regalo
          - regalo_disponible
          - presentacion
 
jobs:
  enviar-notificacion:
    runs-on: ubuntu-latest
    steps:
      - name: Determinar tipo de notificación
        id: tipo
        run: |
          NOW="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.tipo }}"
 
          PISTAS_JUEGO=("0 0 22 2 *" "0 0 23 2 *" "0 0 24 2 *" "0 12 24 2 *" "0 0 25 2 *" "0 12 25 2 *" "0 0 26 2 *" "0 0 27 2 *")
          PRES="30 10 27 2 *"
          PISTAS_REGALO=("0 23 1 3 *" "0 23 8 3 *" "0 23 15 3 *" "0 23 22 3 *" "0 22 29 3 *" "0 22 5 4 *" "0 22 12 4 *" "0 22 19 4 *" "0 22 26 4 *" "0 22 3 5 *" "0 22 10 5 *" "0 22 17 5 *" "0 22 24 5 *" "0 22 31 5 *" "0 22 7 6 *" "0 22 14 6 *" "0 22 21 6 *" "0 22 28 6 *")
 
          if [ -n "$MANUAL" ]; then
            echo "tipo=$MANUAL" >> $GITHUB_OUTPUT
          elif [ "$NOW" = "$PRES" ]; then
            echo "tipo=presentacion" >> $GITHUB_OUTPUT
          elif [[ " ${PISTAS_JUEGO[@]} " =~ " ${NOW} " ]]; then
            echo "tipo=pista_juego" >> $GITHUB_OUTPUT
          elif [[ " ${PISTAS_REGALO[@]} " =~ " ${NOW} " ]]; then
            echo "tipo=pista_regalo" >> $GITHUB_OUTPUT
          else
            echo "tipo=regalo_disponible" >> $GITHUB_OUTPUT
          fi
 
      - name: Enviar notificación — Pista del minijuego
        if: steps.tipo.outputs.tipo == 'pista_juego'
        run: |
          curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "73dafac1-0650-4dc1-b785-a3ce02cc14bf",
              "included_segments": ["All"],
              "headings": {"en": "🔡 Nueva pista disponible"},
              "contents": {"en": "¡Hola, Sanaa! Tienes una nueva pista en tu regalo. Pulsa aquí para verla."},
              "url": "https://meta-mage.github.io/#game",
              "chrome_web_icon": "https://meta-mage.github.io/icon-192.png"
            }'
 
      - name: Enviar notificación — Pista de regalo
        if: steps.tipo.outputs.tipo == 'pista_regalo'
        run: |
          curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "73dafac1-0650-4dc1-b785-a3ce02cc14bf",
              "included_segments": ["All"],
              "headings": {"en": "🌱 Nueva pista en 18 Semanas"},
              "contents": {"en": "¡Hola, Sanaa! Tienes una nueva pista en 18 Semanas. Pulsa aquí para verla."},
              "url": "https://meta-mage.github.io/#gifts",
              "chrome_web_icon": "https://meta-mage.github.io/icon-192.png"
            }'
 
      - name: Enviar notificación — Regalo disponible
        if: steps.tipo.outputs.tipo == 'regalo_disponible'
        run: |
          curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "73dafac1-0650-4dc1-b785-a3ce02cc14bf",
              "included_segments": ["All"],
              "headings": {"en": "🎁 ¡Nuevo regalo disponible!"},
              "contents": {"en": "¡Hola, Sanaa! Tienes un nuevo regalo disponible, ¿has visto ya la pista?"},
              "url": "https://meta-mage.github.io/#gifts",
              "chrome_web_icon": "https://meta-mage.github.io/icon-192.png"
            }'
 
      - name: Enviar notificación — Presentación desbloqueada
        if: steps.tipo.outputs.tipo == 'presentacion'
        run: |
          curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "73dafac1-0650-4dc1-b785-a3ce02cc14bf",
              "included_segments": ["All"],
              "headings": {"en": "💛 ¡Tu regalo ya tiene nombre y forma!"},
              "contents": {"en": "Ya puedes leer la presentación oficial de tu regalo. Hay una novedad importante esperándote."},
              "url": "https://meta-mage.github.io/",
              "chrome_web_icon": "https://meta-mage.github.io/icon-192.png"
            }'
