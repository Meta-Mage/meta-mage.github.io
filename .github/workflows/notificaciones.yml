name: Notificaciones 18 Semanas
 
on:
  schedule:
    # ===================== MINIJUEGO — PISTAS =====================
    # Pista 1: Dom 22 Feb 00:00 UTC (01:00 España)
    - cron: '0 0 22 2 *'
    # Pista 2: Lun 23 Feb 00:00 UTC
    - cron: '0 0 23 2 *'
    # Pista 3: Mar 24 Feb 00:00 UTC
    - cron: '0 0 24 2 *'
    # Pista 4: Mar 24 Feb 12:00 UTC
    - cron: '0 12 24 2 *'
    # Pista 5: Mié 25 Feb 00:00 UTC
    - cron: '0 0 25 2 *'
    # Pista 6: Mié 25 Feb 12:00 UTC
    - cron: '0 12 25 2 *'
    # Pista 7: Jue 26 Feb 00:00 UTC
    - cron: '0 0 26 2 *'
    # Pista 8: Vie 27 Feb 00:00 UTC
    - cron: '0 0 27 2 *'
 
    # ===================== PRESENTACIÓN =====================
    # Vie 27 Feb 10:30 UTC = 11:30 España (UTC+1)
    - cron: '30 10 27 2 *'
 
    # ===================== SEMANAS 1-9 (ya pasadas) =====================
    # Comentadas — ya no se necesitan
 
    # ===================== PISTAS DE REGALOS (domingos) =====================
    # España UTC+2 (verano): 00:00 España = 22:00 UTC día anterior
 
    # Semana 10: dom 7 jun 22:00 UTC = lun 8 jun 00:00 España
    - cron: '0 22 7 6 *'
    # Semana 11: dom 14 jun 22:00 UTC
    - cron: '0 22 14 6 *'
    # Semana 12: dom 21 jun 22:00 UTC
    - cron: '0 22 21 6 *'
    # Semana 13: dom 28 jun 22:00 UTC
    - cron: '0 22 28 6 *'
    # Semana 14: dom 5 jul 22:00 UTC
    - cron: '0 22 5 7 *'
    # Semana 15: dom 12 jul 22:00 UTC
    - cron: '0 22 12 7 *'
    # Semana 16: dom 19 jul 22:00 UTC
    - cron: '0 22 19 7 *'
    # Semana 17: dom 30 ago 22:00 UTC
    - cron: '0 22 30 8 *'
    # Semana 18: dom 6 sep 22:00 UTC
    - cron: '0 22 6 9 *'
 
    # ===================== REGALOS DISPONIBLES (lunes) =====================
    # Semana 10: lun 8 jun 22:00 UTC = mar 9 jun 00:00 España
    # Nota: el regalo se activa el lunes, la notificación sale ese mismo lunes a medianoche
    - cron: '0 22 8 6 *'
    # Semana 11: lun 15 jun 22:00 UTC
    - cron: '0 22 15 6 *'
    # Semana 12: lun 22 jun 22:00 UTC
    - cron: '0 22 22 6 *'
    # Semana 13: lun 29 jun 22:00 UTC
    - cron: '0 22 29 6 *'
    # Semana 14: lun 6 jul 22:00 UTC
    - cron: '0 22 6 7 *'
    # Semana 15: lun 13 jul 22:00 UTC
    - cron: '0 22 13 7 *'
    # Semana 16: lun 20 jul 22:00 UTC
    - cron: '0 22 20 7 *'
    # Semana 17: lun 31 ago 22:00 UTC
    - cron: '0 22 31 8 *'
    # Semana 18: lun 7 sep 22:00 UTC
    - cron: '0 22 7 9 *'
 
  workflow_dispatch:
    inputs:
      tipo:
        description: 'Tipo de notificación manual'
        required: true
        default: 'pista_regalo'
        type: choice
        options:
          - pista_juego
          - pista_regalo
          - regalo_disponible
          - presentacion
 
jobs:
  enviar-notificacion:
    runs-on: ubuntu-latest
    steps:
      - name: Determinar tipo de notificación
        id: tipo
        run: |
          NOW="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.tipo }}"
 
          PISTAS_JUEGO=("0 0 22 2 *" "0 0 23 2 *" "0 0 24 2 *" "0 12 24 2 *" "0 0 25 2 *" "0 12 25 2 *" "0 0 26 2 *" "0 0 27 2 *")
          PRES="30 10 27 2 *"
          PISTAS_REGALO=("0 22 7 6 *" "0 22 14 6 *" "0 22 21 6 *" "0 22 28 6 *" "0 22 5 7 *" "0 22 12 7 *" "0 22 19 7 *" "0 22 30 8 *" "0 22 6 9 *")
          REGALOS_DISPONIBLES=("0 22 8 6 *" "0 22 15 6 *" "0 22 22 6 *" "0 22 29 6 *" "0 22 6 7 *" "0 22 13 7 *" "0 22 20 7 *" "0 22 31 8 *" "0 22 7 9 *")
 
          if [ -n "$MANUAL" ]; then
            echo "tipo=$MANUAL" >> $GITHUB_OUTPUT
          elif [ "$NOW" = "$PRES" ]; then
            echo "tipo=presentacion" >> $GITHUB_OUTPUT
          elif [[ " ${PISTAS_JUEGO[@]} " =~ " ${NOW} " ]]; then
            echo "tipo=pista_juego" >> $GITHUB_OUTPUT
          elif [[ " ${PISTAS_REGALO[@]} " =~ " ${NOW} " ]]; then
            echo "tipo=pista_regalo" >> $GITHUB_OUTPUT
          elif [[ " ${REGALOS_DISPONIBLES[@]} " =~ " ${NOW} " ]]; then
            echo "tipo=regalo_disponible" >> $GITHUB_OUTPUT
          fi
 
      - name: Enviar notificación — Pista del minijuego
        if: steps.tipo.outputs.tipo == 'pista_juego'
        run: |
          curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "73dafac1-0650-4dc1-b785-a3ce02cc14bf",
              "included_segments": ["All"],
              "headings": {"en": "🔡 Nueva pista disponible"},
              "contents": {"en": "¡Hola, Sanaa! Tienes una nueva pista en tu regalo. Pulsa aquí para verla."},
              "url": "https://meta-mage.github.io/#game",
              "chrome_web_icon": "https://meta-mage.github.io/icon-192.png"
            }'
 
      - name: Enviar notificación — Pista de regalo
        if: steps.tipo.outputs.tipo == 'pista_regalo'
        run: |
          curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "73dafac1-0650-4dc1-b785-a3ce02cc14bf",
              "included_segments": ["All"],
              "headings": {"en": "🌱 Nueva pista en 18 Semanas"},
              "contents": {"en": "¡Hola, Sanaa! Tienes una nueva pista esta semana. Pulsa para verla."},
              "url": "https://meta-mage.github.io/#gifts",
              "chrome_web_icon": "https://meta-mage.github.io/icon-192.png"
            }'
 
      - name: Enviar notificación — Regalo disponible
        if: steps.tipo.outputs.tipo == 'regalo_disponible'
        run: |
          curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "73dafac1-0650-4dc1-b785-a3ce02cc14bf",
              "included_segments": ["All"],
              "headings": {"en": "🎁 ¡Nuevo regalo disponible!"},
              "contents": {"en": "¡Hola, Sanaa! Ya tienes disponible tu nuevo regalo. ¿Has visto ya la pista?"},
              "url": "https://meta-mage.github.io/#gifts",
              "chrome_web_icon": "https://meta-mage.github.io/icon-192.png"
            }'
 
      - name: Enviar notificación — Presentación desbloqueada
        if: steps.tipo.outputs.tipo == 'presentacion'
        run: |
          curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "73dafac1-0650-4dc1-b785-a3ce02cc14bf",
              "included_segments": ["All"],
              "headings": {"en": "💛 ¡Tu regalo ya tiene nombre y forma!"},
              "contents": {"en": "Ya puedes leer la presentación oficial de tu regalo. Hay una novedad importante esperándote."},
              "url": "https://meta-mage.github.io/",
              "chrome_web_icon": "https://meta-mage.github.io/icon-192.png"
            }'
